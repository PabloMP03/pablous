<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PabloUs 🎮</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1c1c28;
      --border: #2a2a3d;
      --accent: #ff3d6b;
      --accent2: #7c3aed;
      --accent3: #00d4ff;
      --gold: #ffd700;
      --text: #f0f0f5;
      --muted: #6b6b8a;
      --success: #00e676;
      --error: #ff3d6b;
      --easy: #00e676;
      --medium: #ffaa00;
      --hard: #ff6b35;
      --vhard: #ff3d6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: manipulation; /* evita el zoom por doble-tap en todo el juego */
    }

    /* ── PANTALLAS ── */
    .screen { display: none; min-height: 100vh; padding: 20px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ── INICIO ── */
    #screen-inicio {
      background: radial-gradient(ellipse at top, #1a0a2e 0%, var(--bg) 60%);
      text-align: center;
      gap: 32px;
    }

    .logo-wrap { position: relative; }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 20vw, 120px);
      line-height: 0.9;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      filter: drop-shadow(0 0 30px rgba(255,61,107,0.4));
    }
    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .inicio-desc {
      font-size: 16px;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.6;
    }

    .input-wrap { width: 100%; max-width: 320px; }

    /* ── ADMIN PASSWORD ── */
    #screen-pass {
      background: radial-gradient(ellipse at top, #1a0a2e 0%, var(--bg) 60%);
    }
    .admin-pass-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      width: 100%;
      max-width: 320px;
    }
    .admin-pass-emoji { font-size: 40px; margin-bottom: 8px; }
    .admin-pass-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
    .admin-pass-desc { font-size: 13px; color: var(--muted); margin: 8px 0 20px; line-height: 1.5; }
    .admin-pass-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      outline: none;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .admin-pass-input:focus { border-color: var(--accent); }
    .admin-pass-actions { display: flex; gap: 10px; }
    .admin-pass-actions .btn { max-width: none; flex: 1; padding: 12px; font-size: 14px; }
    .input-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: block; }

    select, input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    select:focus, input[type="text"]:focus { border-color: var(--accent); }
    select option { background: var(--card); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 320px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 4px 20px rgba(255,61,107,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,61,107,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-skip {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      font-size: 14px;
      padding: 12px 24px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── LOBBY / RANKING ── */
    #screen-lobby {
      background: radial-gradient(ellipse at top, #0a1a2e 0%, var(--bg) 60%);
      gap: 24px;
      padding: 24px 20px;
      justify-content: flex-start;
      padding-top: 48px;
    }

    .lobby-header { text-align: center; width: 100%; }
    .lobby-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lobby-player {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }
    .lobby-player span { color: var(--text); font-weight: 700; }

    .granfinal-card {
      background: linear-gradient(135deg, rgba(255,215,0,0.16), rgba(255,107,53,0.16)) !important;
      border: 1.5px solid rgba(255,215,0,0.55) !important;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255,215,0,0.15), inset 0 0 20px rgba(255,215,0,0.05);
    }
    .granfinal-card .minijuego-name {
      color: var(--gold);
      font-weight: 900;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
    }
    .granfinal-card .minijuego-emoji {
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
    }
    .granfinal-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(115deg, transparent 35%, rgba(255,215,0,0.35) 50%, transparent 65%);
      animation: shimmer 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmer {
      0% { transform: translateX(-30%) translateY(-30%) rotate(0deg); }
      100% { transform: translateX(30%) translateY(30%) rotate(0deg); }
    }
    .granfinal-card.locked {
      box-shadow: 0 0 12px rgba(255,215,0,0.08);
    }
    .granfinal-card.locked::before { opacity: 0.4; }

    .minijuegos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 420px;
    }

    /* ── ENCUESTA ── */
    .encuesta-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
    }
    .encuesta-question {
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .encuesta-buttons {
      display: flex;
      gap: 10px;
    }
    .encuesta-btn { max-width: none; flex: 1; padding: 12px; font-size: 14px; }
    .encuesta-result { display: flex; flex-direction: column; gap: 10px; }
    .encuesta-row {
      display: grid;
      grid-template-columns: 46px 1fr 64px;
      align-items: center;
      gap: 10px;
    }
    .encuesta-label { font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .encuesta-bar-wrap {
      height: 18px;
      background: var(--surface);
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .encuesta-bar {
      height: 100%;
      border-radius: 9px 0 0 9px;
      transition: width 0.5s ease;
    }
    .encuesta-bar.si { background: linear-gradient(90deg, var(--success), #00b85c); }
    .encuesta-bar.no { background: linear-gradient(90deg, var(--error), #cc1f4d); }
    .encuesta-pct { font-size: 12px; font-weight: 700; text-align: right; color: var(--text); }
    .encuesta-total { text-align: center; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .encuesta-voted-tag { color: var(--accent3); font-weight: 800; }

    .encuesta-detalle { margin-top: 4px; }
    .encuesta-detalle summary {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      list-style: none;
      user-select: none;
    }
    .encuesta-detalle summary::-webkit-details-marker { display: none; }
    .encuesta-quien {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--muted);
    }
    .encuesta-quien b { color: var(--text); }
    .encuesta-quien .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .encuesta-quien .dot.si { background: var(--success); }
    .encuesta-quien .dot.no { background: var(--error); }

    .minijuego-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .minijuego-card.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .minijuego-card.done {
      border-color: var(--success);
      background: rgba(0,230,118,0.05);
    }
    .minijuego-card:not(.locked):not(.done):hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .minijuego-emoji { font-size: 32px; margin-bottom: 8px; }
    .minijuego-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .minijuego-status { font-size: 11px; color: var(--muted); }
    .minijuego-score { font-size: 18px; font-weight: 900; color: var(--success); margin-top: 4px; }
    .lock-icon { font-size: 20px; position: absolute; top: 8px; right: 8px; }
    .unlock-date { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .countdown { font-size: 12px; font-weight: 700; color: var(--accent3); margin-top: 4px; font-variant-numeric: tabular-nums; }

    /* ── RANKING ── */
    .ranking-section { width: 100%; max-width: 420px; }
    .ranking-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .ranking-list { display: flex; flex-direction: column; gap: 8px; }
    .ranking-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ranking-item.me { border-color: var(--accent); background: rgba(255,61,107,0.05); }
    .ranking-item.first { border-color: var(--gold); background: rgba(255,215,0,0.05); }
    .rank-pos { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--muted); width: 32px; text-align: center; }
    .rank-pos.gold { color: var(--gold); }
    .rank-pos.silver { color: #c0c0c0; }
    .rank-pos.bronze { color: #cd7f32; }
    .rank-info { flex: 1; }
    .rank-name { font-weight: 700; font-size: 15px; }
    .rank-details { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .rank-score { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent3); }

    /* ── MINIJUEGO WRAPPER ── */
    #screen-minijuego {
      padding: 0;
      justify-content: flex-start;
      background: var(--bg);
    }

    .mj-header {
      width: 100%;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mj-back { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }
    .mj-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; flex: 1; }
    .mj-pregunta { font-size: 12px; color: var(--muted); }

    .mj-body { flex: 1; width: 100%; padding: 24px 20px; overflow-y: auto; }

    /* Barra de progreso */
    .progress-bar-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 24px; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.3s; }

    /* Puntuación en tiempo real */
    .score-display {
      text-align: center;
      margin-bottom: 20px;
    }
    .score-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .score-value { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--accent3); line-height: 1; }

    /* Tarjeta de pregunta */
    .question-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .question-difficulty {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .diff-facil { background: rgba(0,230,118,0.15); color: var(--easy); }
    .diff-medio { background: rgba(255,170,0,0.15); color: var(--medium); }
    .diff-dificil { background: rgba(255,107,53,0.15); color: var(--hard); }
    .diff-muydificil { background: rgba(255,61,107,0.15); color: var(--vhard); }

    .question-text {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .question-points { font-size: 12px; color: var(--muted); }

    /* Opciones */
    .options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .option-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--accent2); background: rgba(124,58,237,0.1); }
    .option-btn.correct { border-color: var(--success) !important; background: rgba(0,230,118,0.15) !important; color: var(--success); }
    .option-btn.wrong { border-color: var(--error) !important; background: rgba(255,61,107,0.15) !important; color: var(--error); }
    .option-btn:disabled { cursor: not-allowed; }
    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── CANCIONES ── */
    .audio-player {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    .audio-note { font-size: 48px; margin-bottom: 12px; }
    .audio-timer { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--accent3); }
    .audio-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .play-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      width: 64px;
      height: 64px;
      font-size: 24px;
      cursor: pointer;
      margin: 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      box-shadow: 0 4px 20px rgba(255,61,107,0.4);
    }
    .play-btn:hover { transform: scale(1.1); }
    .play-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── VIDEO ── */
    .video-player {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
    }
    .video-wrap {
      position: relative;
      width: 100%;
      max-width: 280px;
      margin: 14px auto 0;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 9/16;
    }
    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      z-index: 2;
    }
    .video-play-btn.hidden { display: none; }

    /* ── FOTOS ── */
    .foto-container {
      position: relative;
      width: 100%;
      max-width: 340px;
      margin: 0 auto 20px;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: var(--card);
    }
    .foto-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      filter: blur(0px);
      transition: filter 0.5s;
    }
    .foto-intentos {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .intento-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .intento-dot.used { background: var(--error); }
    .intento-dot.active { background: var(--accent); }

    .selector-wrap { width: 100%; max-width: 340px; margin: 0 auto 12px; }

    /* ── FRASES / WORDLE ── */
    .frase-display {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      font-size: 18px;
      line-height: 1.8;
      text-align: center;
      font-style: italic;
      color: var(--muted);
    }
    .frase-display .blank {
      display: inline-block;
      border-bottom: 2px solid var(--accent);
      min-width: 40px;
      color: var(--text);
      font-style: normal;
      font-weight: 700;
    }

    .wordle-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
    }
    .wordle-row { display: flex; gap: 6px; }
    .wordle-cell {
      width: 44px; height: 44px;
      border: 2px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      transition: all 0.1s;
    }
    .wordle-cell.active { border-color: var(--accent2); }
    .wordle-cell.correct { background: var(--success); border-color: var(--success); color: #000; }
    .wordle-cell.present { background: var(--medium); border-color: var(--medium); color: #000; }
    .wordle-cell.absent { background: var(--border); border-color: var(--border); color: var(--muted); }

    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      width: 100%;
    }
    .keyboard-row { display: flex; gap: 4px; }
    .key {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s;
      min-width: 30px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .key:active { transform: scale(0.92); }
    .key.wide { min-width: 46px; font-size: 11px; }
    .key.correct { background: var(--success); border-color: var(--success); color: #000; }
    .key.present { background: var(--medium); border-color: var(--medium); color: #000; }
    .key.absent { background: #333; border-color: #333; color: var(--muted); }

    /* ── RESULTADO PREGUNTA ── */
    .result-banner {
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 700;
      font-size: 18px;
    }
    .result-banner.correct { background: rgba(0,230,118,0.15); color: var(--success); border: 1px solid var(--success); }
    .result-banner.wrong { background: rgba(255,61,107,0.15); color: var(--error); border: 1px solid var(--error); }

async function sbFetch(path, options = {}) {
  const headers = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json",
    Prefer: "return=representation",
    ...(options.headers || {})
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers
  });
  if (!res.ok && res.status !== 406) {
    const err = await res.text();
    throw new Error(err);
  }
  try {
    return await res.json();
  } catch {
    return null;
  }
}

async function getScores() {

    await sbFetch('poll_votes?on_conflict=player_name', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify({ player_name: jugadorActual, voto: opcion })
    });
  } catch (err) {
    console.error('Error votando:', err);
    showToast('⚠️ No se pudo guardar tu voto, inténtalo de nuevo');
    buttons.forEach(b => b.disabled = false);
    return;
  }
  await renderEncuesta();
}

async function renderEncuesta() {
  const el = document.getElementById('encuesta-card');
  if (!el) return;

  let votes;
  try {
    votes = await getPollVotes();
  } catch (err) {
    console.error('Error cargando encuesta:', err);
    if (!el.dataset.cargada) {
      el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px">No se pudo cargar la encuesta 📡</div>';
    }
    return;
  }
  el.dataset.cargada = '1';

  const miVoto = votes.find(v => v.player_name === jugadorActual);

  if (!miVoto) {
    // Aún no ha votado: solo ve la pregunta y los botones, sin resultados
    el.innerHTML = `
      <div class="encuesta-question">🔥 ¿Ponemos castigo para el último clasificado?</div>
      <div class="encuesta-buttons">
        <button class="btn btn-primary encuesta-btn" onclick="votarEncuesta('si')">Sí</button>
        <button class="btn btn-secondary encuesta-btn" onclick="votarEncuesta('no')">No</button>
      </div>`;
    return;
  }

  // Ya ha votado: ahora sí ve los resultados
  const total = votes.length;
  const siCount = votes.filter(v => v.voto === 'si').length;
  const noCount = total - siCount;
  const siPct = total ? Math.round((siCount / total) * 100) : 0;
  const noPct = total ? 100 - siPct : 0;
  const nombresSi = votes.filter(v => v.voto === 'si').map(v => v.player_name).sort();
  const nombresNo = votes.filter(v => v.voto === 'no').map(v => v.player_name).sort();

  el.innerHTML = `
    <div class="encuesta-question">🔥 ¿Ponemos castigo para el último clasificado?</div>
    <div class="encuesta-result">
      <div class="encuesta-row">
        <div class="encuesta-label">Sí ${miVoto.voto === 'si' ? '<span class="encuesta-voted-tag">· tú</span>' : ''}</div>
        <div class="encuesta-bar-wrap"><div class="encuesta-bar si" style="width:${siPct}%"></div></div>
        <div class="encuesta-pct">${siPct}% (${siCount})</div>
      </div>
      <div class="encuesta-row">
        <div class="encuesta-label">No ${miVoto.voto === 'no' ? '<span class="encuesta-voted-tag">· tú</span>' : ''}</div>
        <div class="encuesta-bar-wrap"><div class="encuesta-bar no" style="width:${noPct}%"></div></div>
        <div class="encuesta-pct">${noPct}% (${noCount})</div>
      </div>
      <div class="encuesta-total">${total} voto${total === 1 ? '' : 's'} en total</div>
      <details class="encuesta-detalle">
        <summary>👀 Ver quién ha votado</summary>
        <div class="encuesta-quien">
          <div><span class="dot si"></span><b>Sí:</b> ${nombresSi.length ? nombresSi.join(', ') : '—'}</div>
          <div><span class="dot no"></span><b>No:</b> ${nombresNo.length ? nombresNo.join(', ') : '—'}</div>
        </div>
      </details>
    </div>`;
}

function initRealtime() {

// ══════════════════════════════════════════════
// RANKING
// ══════════════════════════════════════════════
async function actualizarRanking() {
  try {
    const scores = await getScores();

    // Agrupar por jugador: total + desglose por minijuego (Pablo excluido = admin)
    const porJugador = {};
    scores.forEach(s => {
      if (s.player_name === ADMIN) return;
      if (!porJugador[s.player_name]) porJugador[s.player_name] = { total: 0, scores: {} };
      porJugador[s.player_name].scores[s.minijuego] = s.puntuacion;
      porJugador[s.player_name].total += s.puntuacion;
    });

    // Si soy yo (no admin), refrescar misScores para el grid
    if (jugadorActual && jugadorActual !== ADMIN && porJugador[jugadorActual]) {
      misScores = porJugador[jugadorActual].scores;
    }

    // Array ordenado por puntuación total (mayor a menor)
    rankingData = Object.entries(porJugador)
      .map(([nombre, d]) => ({ nombre, total: d.total, scores: d.scores, jugados: Object.keys(d.scores).length }))
      .sort((a, b) => b.total - a.total);

    renderRanking();
  } catch (err) {
    console.error('Error cargando ranking:', err);
    const list = document.getElementById('ranking-list');
    if (list && !rankingData.length) {
      list.innerHTML = `
        <div style="text-align:center;color:var(--muted);padding:24px;font-size:13px;">
          No se pudo cargar el ranking.<br>Comprueba tu conexión 📡
        </div>`;
    }
  }

  // SIEMPRE refrescar la rejilla de minijuegos (esto faltaba)
  actualizarMinijuegosGrid();
}

function renderRanking() {
  const list = document.getElementById('ranking-list');
  if (!list) return;

  if (!rankingData.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px;font-size:14px;">Nadie ha jugado aún 👀</div>';
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  list.innerHTML = rankingData.map((p, i) => {
    const esYo = p.nombre === jugadorActual;
    const clases = `ranking-item ${esYo ? 'me' : ''} ${i === 0 ? 'first' : ''}`;
    const posClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const details = MINIJUEGOS_CONFIG.map(m => {
      const sc = p.scores[m.id];
      return sc !== undefined ? `${m.emoji}${sc}` : `${m.emoji}—`;
    }).join(' ');
    return `
      <div class="${clases}">
        <div class="rank-pos ${posClass}">${medals[i] || (i+1)}</div>
        <div class="rank-info">
          <div class="rank-name">${p.nombre}${esYo ? ' (tú)' : ''}</div>
          <div class="rank-details">${details} · ${p.jugados}/${MINIJUEGOS_CONFIG.length}</div>
        </div>
        <div class="rank-score">${p.total}</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// UNLOCK LOGIC
// ══════════════════════════════════════════════
function isUnlocked(id) {

  if (esPrueba(jugadorActual)) {
    return true;
  }

  const now = new Date();

  return now >= UNLOCK_DATES[id];
}

function formatUnlockDate(id) {
  const d = UNLOCK_DATES[id];
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
}

// ══════════════════════════════════════════════
// LOBBY
// ══════════════════════════════════════════════
function tiempoHasta(fecha) {
  const ms = fecha - new Date();
  if (ms <= 0) return null;
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  const min = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (d > 0) return `${d}d ${h}h ${min}m`;
  if (h > 0) return `${h}h ${min}m ${s}s`;
  return `${min}m ${s}s`;
}

function actualizarMinijuegosGrid() {
  const grid = document.getElementById('minijuegos-grid');
  if (!grid) return;

  const esAdmin = jugadorActual === ADMIN;
  const modoPrueba = esPrueba(jugadorActual);

  const cardsHtml = MINIJUEGOS_CONFIG.map(m => {
    const unlocked = isUnlocked(m.id);
    // En modo prueba (admin o tester) nunca hay minijuegos "completados": se pueden rejugar
    const done = !modoPrueba && misScores[m.id] !== undefined;
    const sc = misScores[m.id];

    let statusHtml = '';
    if (done) {
      statusHtml = `<div class="minijuego-score">${sc}</div><div class="minijuego-status">✅ Completado</div>`;
    } else if (unlocked) {
      const etiqueta = esAdmin ? '👑 Jugar (admin)' : (modoPrueba ? '🧪 Jugar (prueba)' : '¡Disponible!');
      statusHtml = `<div class="minijuego-status">${etiqueta}</div>`;
    } else {
      const cd = tiempoHasta(UNLOCK_DATES[m.id]);
      statusHtml = `
        <div class="unlock-date">Se desbloquea el ${formatUnlockDate(m.id)}</div>
        <div class="countdown" id="cd-${m.id}">⏳ ${cd || ''}</div>`;
    }

    return `
      <div class="minijuego-card ${!unlocked ? 'locked' : ''} ${done ? 'done' : ''}"
           onclick="${unlocked ? `startMinijuego('${m.id}')` : ''}">
        ${!unlocked ? '<div class="lock-icon">🔒</div>' : ''}
        <div class="minijuego-emoji">${m.emoji}</div>
        <div class="minijuego-name">${m.nombre}</div>
        ${statusHtml}
      </div>`;
  }).join('');

  grid.innerHTML = cardsHtml + buildPremioCard();
}

// 6ª tarjeta especial: no es un minijuego jugable todavía (está por diseñar),
// no puntúa ni afecta al ranking. Se desbloquea el 18 de julio, día de la fiesta.
const GRAN_FINAL_UNLOCK_DATE = new Date('2026-07-18T00:00:00+02:00');

function buildPremioCard() {
  const unlocked = new Date() >= GRAN_FINAL_UNLOCK_DATE;

  if (unlocked) {
    return `
      <div class="minijuego-card granfinal-card done">
        <div class="minijuego-emoji">🏆</div>
        <div class="minijuego-name">La Gran Final</div>
        <div class="minijuego-status">¡Ha llegado el día! 🎉</div>
      </div>`;
  }

  const cd = tiempoHasta(GRAN_FINAL_UNLOCK_DATE);
  const fecha = GRAN_FINAL_UNLOCK_DATE.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
  return `
    <div class="minijuego-card granfinal-card locked">
      <div class="lock-icon">🔒</div>
      <div class="minijuego-emoji">🏆</div>
      <div class="minijuego-name">La Gran Final</div>
      <div class="unlock-date">Se revela el ${fecha}</div>
      <div class="countdown" id="cd-granfinal">⏳ ${cd || ''}</div>
    </div>`;
}

// Actualiza los contadores cada segundo; si algo se desbloquea, repinta la rejilla
function tickCountdowns() {
  const lobbyActivo = document.getElementById('screen-lobby').classList.contains('active');
  if (!lobbyActivo) return;
  let necesitaRepintar = false;
  MINIJUEGOS_CONFIG.forEach(m => {
    const el = document.getElementById(`cd-${m.id}`);
    if (el) {
      const t = tiempoHasta(UNLOCK_DATES[m.id]);
      if (t) el.textContent = `⏳ ${t}`;
      else necesitaRepintar = true; // acaba de desbloquearse
    }
  });
  const elPremio = document.getElementById('cd-granfinal');
  if (elPremio) {
    const t = tiempoHasta(GRAN_FINAL_UNLOCK_DATE);
    if (t) elPremio.textContent = `⏳ ${t}`;
    else necesitaRepintar = true;
  }
  if (necesitaRepintar) actualizarMinijuegosGrid();
}
setInterval(tickCountdowns, 1000);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

async function entrar() {

    const sel = document.getElementById('select-jugador');
    const nombre = sel.value;

    if (!nombre) {
        showToast("Selecciona tu nombre");
        return;
    }

    // El admin (Pablo) tiene su propia contraseña fija (función check_admin_password)
    if (nombre === ADMIN) {
        abrirPantallaPass(nombre, 'admin');
        return;
    }

    // Resto de perfiles: contraseña propia. Si es su primera vez, la crean.
    let existe;
    try {
        existe = await profileExists(nombre);
    } catch (err) {
        console.error('Error comprobando perfil:', err);
        showToast('⚠️ Error de conexión, inténtalo de nuevo');
        return;
    }

    abrirPantallaPass(nombre, existe ? 'login' : 'registro');
}

// ── Pantalla de contraseña unificada ──
// modo: 'admin' (contraseña fija de Pablo) | 'login' (verificar) | 'registro' (crear 1ª vez)
let passMode = 'login';
let passNombre = '';

function abrirPantallaPass(nombre, modo) {
    passNombre = nombre;
    passMode = modo;

    const titulo = document.getElementById('pass-title');
    const desc = document.getElementById('pass-desc');
    const btn = document.getElementById('pass-btn');
    const input = document.getElementById('pass-input');
    const input2wrap = document.getElementById('pass-input2-wrap');

    input.value = '';
    document.getElementById('pass-input2').value = '';

    if (modo === 'admin') {
        titulo.textContent = '🔐 Acceso Admin';
        desc.textContent = 'Perfil protegido. Introduce la contraseña de administrador.';
        btn.textContent = 'Entrar';
        input2wrap.style.display = 'none';
    } else if (modo === 'login') {
        titulo.textContent = `👋 Hola, ${nombre}`;
        desc.textContent = 'Introduce tu contraseña para entrar a tu perfil.';
        btn.textContent = 'Entrar';
        input2wrap.style.display = 'none';
    } else { // registro
        titulo.textContent = `✨ Bienvenido, ${nombre}`;
        desc.textContent = 'Es tu primera vez. Crea una contraseña para proteger tu perfil (la necesitarás para volver a entrar).';
        btn.textContent = 'Crear y entrar';
        input2wrap.style.display = 'block';
    }

    showScreen('pass');
    setTimeout(() => input.focus(), 100);
}

async function confirmarPass() {
    const input = document.getElementById('pass-input');
    const input2 = document.getElementById('pass-input2');
    const btn = document.getElementById('pass-btn');
    const valor = input.value;

    if (!valor) { showToast('Escribe una contraseña'); return; }

    // En registro, validar que las dos contraseñas coincidan
    if (passMode === 'registro') {
        if (valor.length < 3) { showToast('Mínimo 3 caracteres'); return; }
        if (valor !== input2.value) { shakePassCard(); showToast('❌ Las contraseñas no coinciden'); return; }
    }

    btn.disabled = true;
    const txtOriginal = btn.textContent;
    btn.textContent = 'Comprobando...';

    try {
        if (passMode === 'admin') {
            const ok = await checkAdminPasswordRemote(valor);
            if (ok === true) return completarEntrada(ADMIN);
            falloPass('❌ Contraseña incorrecta');
        } else if (passMode === 'login') {
            const ok = await checkProfilePassword(passNombre, valor);
            if (ok === true) return completarEntrada(passNombre);
            falloPass('❌ Contraseña incorrecta');
        } else { // registro
            const ok = await registerProfile(passNombre, valor);
            if (ok === true) return completarEntrada(passNombre);
            // Si devuelve false, alguien lo registró entre medias
            falloPass('⚠️ Ese perfil ya tiene contraseña, entra con ella');
            passMode = 'login';
            document.getElementById('pass-input2-wrap').style.display = 'none';
            document.getElementById('pass-desc').textContent = 'Introduce tu contraseña para entrar a tu perfil.';
        }
    } catch (err) {
        console.error('Error con la contraseña:', err);
        showToast('⚠️ Error de conexión, inténtalo de nuevo');
    } finally {
        btn.disabled = false;
        btn.textContent = txtOriginal;
    }
}

function falloPass(msg) {
    shakePassCard();
    showToast(msg);
    document.getElementById('pass-input').value = '';
    document.getElementById('pass-input2').value = '';
    document.getElementById('pass-input').focus();
}

function shakePassCard() {
    const card = document.getElementById('pass-card');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
}

async function completarEntrada(nombre) {
    jugadorActual = nombre;
    document.getElementById("lobby-nombre").textContent = nombre;
    showScreen("lobby");
    await actualizarRanking();
    await renderEncuesta();
    initRealtime();
}

// La contraseña del admin se verifica en Supabase (función check_admin_password)
async function checkAdminPasswordRemote(pwd) {

}

function cancelarPass() {
    document.getElementById('pass-input').value = '';

}

function volverLobby() {

// ══════════════════════════════════════════════
// INICIAR MINIJUEGO
// ══════════════════════════════════════════════
function startMinijuego(id) {

  if (misScores[id] !== undefined && !esPrueba(jugadorActual)) {
    showCompletado(id);
    return;
  }
  
  minijuegoActivo = id;
  preguntaIdx = 0;
  puntuacionMinijuego = 0;

  const config = MINIJUEGOS_CONFIG.find(m => m.id === id);
  document.getElementById('mj-titulo').textContent = `${config.emoji} ${config.nombre}`;

  // Seleccionar preguntas
  preguntasActuales = seleccionarPreguntas(id);

  showScreen('minijuego');
  renderPregunta();
}

function seleccionarPreguntas(id) {
  const nivelesOrden = ['facil', 'medio', 'dificil', 'muydificil'];
  let preguntas = [];

  if (id === 'trivia') {
    nivelesOrden.forEach(nivel => {
      const pool = TRIVIA[nivel];
      const idx = Math.floor(Math.random() * pool.length);
      preguntas.push({ ...pool[idx], nivel, tipo: 'trivia' });
    });
  } else if (id === 'canciones') {
    nivelesOrden.forEach(nivel => {
      const pool = CANCIONES[nivel];
      const idx = Math.floor(Math.random() * pool.length);
      preguntas.push({ ...pool[idx], nivel, tipo: 'cancion' });
    });
  } else if (id === 'fotos') {
    nivelesOrden.forEach(nivel => {
      const pool = FOTOS[nivel];
      const idx = Math.floor(Math.random() * pool.length);
      preguntas.push({ ...pool[idx], nivel, tipo: 'foto' });
    });
  } else if (id === 'video') {
    // Uno de cada tramo de puntos (400 / 600 / 800), así todos juegan con
    // el mismo potencial máximo aunque les toquen vídeos distintos
    [500, 750, 1250].forEach(tramo => {
      const pool = VIDEOS[tramo];
      const idx = Math.floor(Math.random() * pool.length);
      preguntas.push({ ...pool[idx], tipo: 'video' });
    });
  } else if (id === 'frases') {
    nivelesOrden.forEach(nivel => {
      const pool = FRASES[nivel];
      const idx = Math.floor(Math.random() * pool.length);
      preguntas.push({ ...pool[idx], nivel, tipo: 'frase' });
    });
  }

  return preguntas;
}

function renderPregunta() {
  const total = preguntasActuales.length;
  document.getElementById('mj-pregunta-num').textContent = `${preguntaIdx + 1}/${total}`;

  const pct = (preguntaIdx / total) * 100;
  const p = preguntasActuales[preguntaIdx];

  const body = document.getElementById('mj-body');
  
  const diffLabel = { facil: 'Fácil', medio: 'Media', dificil: 'Difícil', muydificil: 'Muy difícil' };
  const diffClass = { facil: 'diff-facil', medio: 'diff-medio', dificil: 'diff-dificil', muydificil: 'diff-muydificil' };

  if (p.tipo === 'trivia') renderTrivia(body, p, pct, diffLabel, diffClass);
  else if (p.tipo === 'cancion') renderCancion(body, p, pct, diffLabel, diffClass);
  else if (p.tipo === 'video') renderVideo(body, p, pct, diffLabel, diffClass);
  else if (p.tipo === 'foto') renderFoto(body, p, pct, diffLabel, diffClass);
  else if (p.tipo === 'frase') renderFrase(body, p, pct, diffLabel, diffClass);
}

// ══════════════════════════════════════════════
// TRIVIA
// ══════════════════════════════════════════════
function renderTrivia(body, p, pct, diffLabel, diffClass) {
  const pts = PUNTOS[p.nivel];
  body.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="score-display">
      <div class="score-label">Puntuación</div>
      <div class="score-value">${puntuacionMinijuego}</div>
    </div>
    <div class="question-card pop">
      <span class="question-difficulty ${diffClass[p.nivel]}">${diffLabel[p.nivel]}</span>
      <div class="question-text">${p.q}</div>
      <div class="question-points">+${pts} puntos</div>
    </div>
    <div class="options-grid">
      ${p.ops.map((op, i) => `
        <button class="option-btn" onclick="responderTrivia(${i}, ${p.r}, ${pts})">
          <span class="option-letter">${'ABCD'[i]}</span>${op}
        </button>`).join('')}
    </div>`;
}

function responderTrivia(idx, correcta, pts) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  
  const esCorrecta = idx === correcta;
  btns[idx].classList.add(esCorrecta ? 'correct' : 'wrong');
  if (!esCorrecta) btns[correcta].classList.add('correct');

  if (esCorrecta) puntuacionMinijuego += pts;

  setTimeout(() => siguientePregunta(), 1200);
}

// ══════════════════════════════════════════════
// CANCIONES
// ══════════════════════════════════════════════
function renderCancion(body, p, pct, diffLabel, diffClass) {
  const pts = PUNTOS[p.nivel];
  let reproducido = 0;
  const maxReps = p.repetible ? 3 : 1;
  
  body.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="score-display">
      <div class="score-label">Puntuación</div>
      <div class="score-value">${puntuacionMinijuego}</div>
    </div>
    <div class="audio-player pop">
      <div class="audio-note">🎵</div>
      <span class="question-difficulty ${diffClass[p.nivel]}">${diffLabel[p.nivel]}</span>
      <div style="margin:12px 0">
        <button class="play-btn" id="play-btn" onclick="playAudio('${p.archivo}')">▶</button>
      </div>
      <div class="audio-hint" id="audio-hint">Toca para escuchar · ${maxReps === 1 ? '1 reproducción' : `Hasta ${maxReps} reproducciones`}</div>
    </div>
    <div style="text-align:center;margin-bottom:12px;font-size:13px;color:var(--muted)">¿Qué canción es?</div>
    <div class="options-grid">
      ${p.ops.map((op, i) => `
        <button class="option-btn" id="cancion-opt-${i}" onclick="responderCancion(${i}, ${p.r}, ${pts})">
          <span class="option-letter">${'ABCD'[i]}</span>${op}
        </button>`).join('')}
    </div>`;
  
  // Guardar estado de reproducciones
  body.dataset.reps = '0';
  body.dataset.maxReps = maxReps;
}

function playAudio(archivo) {
  const body = document.getElementById('mj-body');
  const reps = parseInt(body.dataset.reps || '0');
  const maxReps = parseInt(body.dataset.maxReps || '1');
  
  if (reps >= maxReps) { showToast('Sin más reproducciones'); return; }
  
  if (audioActual) { audioActual.pause(); audioActual.currentTime = 0; }
  
  audioActual = new Audio(`audio/${archivo}`);
  audioActual.play().catch(() => showToast('Error al reproducir'));
  
  const btn = document.getElementById('play-btn');
  btn.textContent = '⏸';
  btn.disabled = true;
  
  const nuevasReps = reps + 1;
  body.dataset.reps = nuevasReps;
  
  const hint = document.getElementById('audio-hint');
  if (hint) hint.textContent = `Reproducción ${nuevasReps}/${maxReps}`;
  
  audioActual.onended = () => {
    btn.textContent = '▶';
    btn.disabled = nuevasReps >= maxReps;
    if (nuevasReps >= maxReps && hint) hint.textContent = 'Sin más reproducciones';
  };
}

function responderCancion(idx, correcta, pts) {
  if (audioActual) { audioActual.pause(); }
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  
  const esCorrecta = idx === correcta;
  btns[idx].classList.add(esCorrecta ? 'correct' : 'wrong');
  if (!esCorrecta) btns[correcta].classList.add('correct');

  if (esCorrecta) puntuacionMinijuego += pts;
  setTimeout(() => siguientePregunta(), 1200);
}

function renderVideo(body, p, pct, diffLabel, diffClass) {
  const pts = p.puntos;
  const maxReps = p.repetible ? 2 : 1;

  body.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="score-display">
      <div class="score-label">Puntuación</div>

      <div class="video-wrap">
        <video id="video-el" src="videos/${p.archivo}" playsinline webkit-playsinline data-corte="${p.corte}"></video>
        <button class="play-btn video-play-btn" id="video-play-btn" onclick="playVideo()">▶</button>
      </div>
      <div class="audio-hint" id="video-hint">Toca para ver el clip · ${maxReps === 1 ? '1 reproducción' : `Hasta ${maxReps} reproducciones`}</div>
    </div>

        <button class="option-btn" id="video-opt-${i}" onclick="responderVideo(${i}, ${p.r}, ${pts})">
          <span class="option-letter">${'ABCD'[i]}</span>${op}
        </button>`).join('')}
    </div>`;

  body.dataset.reps = '0';
  body.dataset.maxReps = maxReps;
  body.dataset.respondido = '0';

  const video = document.getElementById('video-el');

  // Los archivos no vienen recortados de verdad, así que el corte se
  // fuerza aquí: en cuanto llega al segundo indicado, se pausa solo.
  video.ontimeupdate = () => {
    if (body.dataset.respondido === '1') return; // en fase de "reveal", no cortar
    const corte = parseFloat(video.dataset.corte);
    if (video.currentTime >= corte) {
      video.pause();
    }
  };

  // Cuando se pausa (por el corte o al acabar), reaparece el botón de play
  video.onpause = () => {
    if (body.dataset.respondido === '1') return; // en reveal no tocar la UI
    const btn = document.getElementById('video-play-btn');
    const repsNow = parseInt(body.dataset.reps || '0');
    const maxRepsNow = parseInt(body.dataset.maxReps || '1');
    if (btn) {
      btn.classList.remove('hidden');
      btn.disabled = repsNow >= maxRepsNow;
    }
    const hint = document.getElementById('video-hint');
    if (hint) hint.textContent = repsNow >= maxRepsNow ? 'Sin más reproducciones' : `Reproducción ${repsNow}/${maxRepsNow}`;
  };
}

function playVideo() {
  const body = document.getElementById('mj-body');
  const reps = parseInt(body.dataset.reps || '0');
  const maxReps = parseInt(body.dataset.maxReps || '1');

  if (reps >= maxReps) { showToast('Sin más reproducciones'); return; }

  const video = document.getElementById('video-el');
  const btn = document.getElementById('video-play-btn');
  if (!video) return;

  video.currentTime = 0;
  video.play().catch(() => showToast('Error al reproducir'));
  videoActual = video;

  btn.classList.add('hidden');

  const nuevasReps = reps + 1;
  body.dataset.reps = nuevasReps;

  const hint = document.getElementById('video-hint');
  if (hint) hint.textContent = `Reproducción ${nuevasReps}/${maxReps}`;
}

function responderVideo(idx, correcta, pts) {
  const body = document.getElementById('mj-body');
  const video = document.getElementById('video-el');
  body.dataset.respondido = '1'; // a partir de aquí el corte deja de aplicarse

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const esCorrecta = idx === correcta;
  btns[idx].classList.add(esCorrecta ? 'correct' : 'wrong');
  if (!esCorrecta) btns[correcta].classList.add('correct');

  if (esCorrecta) puntuacionMinijuego += pts;

  const hint = document.getElementById('video-hint');
  if (hint) hint.textContent = '👀 Esto es lo que pasó';

  // Reproduce el vídeo ENTERO desde el principio, sin corte
  if (video) {
    video.currentTime = 0;
    video.play().catch(() => {});
    // Al terminar, muestra el botón para volver a verlo entero
    video.onended = () => {
      const rvBtn = document.getElementById('video-play-btn');
      if (rvBtn) rvBtn.classList.remove('hidden');
    };
  }

  // Botón de play -> ahora reinicia el vídeo completo (sin límite de reproducciones)
  const playBtn = document.getElementById('video-play-btn');
  if (playBtn) {
    playBtn.classList.add('hidden');
    playBtn.disabled = false;
    playBtn.onclick = () => {
      if (!video) return;
      video.currentTime = 0;
      video.play().catch(() => {});
      playBtn.classList.add('hidden');
    };
  }

  // Botón "Siguiente" para pasar cuando quiera el jugador
  const cont = document.createElement('div');
  cont.style.cssText = 'margin-top:16px;text-align:center';
  cont.innerHTML = `<button class="btn btn-primary" style="max-width:340px" onclick="siguientePregunta()">Siguiente →</button>`;
  body.appendChild(cont);
}

let fotoIntentoActual = 0;
const FOTO_BLUR = [20, 12, 6, 0];
// Factor sobre los puntos base del nivel, según el intento (1º=100%, 2º=70%...)
const FOTO_FACTOR_INTENTO = [1, 0.7, 0.4, 0.15];

function puntosFoto(nivel, intento) {
  return Math.round(PUNTOS[nivel] * FOTO_FACTOR_INTENTO[intento]);
}

function renderFoto(body, p, pct, diffLabel, diffClass) {
  fotoIntentoActual = 0;

  const opts = NOMBRES_GRUPO.map(n => `<option value="${n}">${n}</option>`).join('');

  body.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="score-display">
      <div class="score-label">Puntuación</div>
      <div class="score-value">${puntuacionMinijuego}</div>
    </div>
    <div style="text-align:center;margin-bottom:8px">
      <span class="question-difficulty ${diffClass[p.nivel]}">${diffLabel[p.nivel]}</span>
    </div>
    <div class="foto-intentos" id="foto-intentos">
      ${[0,1,2,3].map(i => `<div class="intento-dot ${i === 0 ? 'active' : ''}"></div>`).join('')}
    </div>
    <div class="foto-container pop">
      <img id="foto-img" src="fotos/${p.archivo}" style="filter:blur(${FOTO_BLUR[0]}px);width:100%;height:100%;object-fit:cover" />
    </div>
    <div style="text-align:center;margin-bottom:12px;font-size:13px;color:var(--muted)">¿Quién es? · +${puntosFoto(p.nivel, 0)} pts ahora</div>
    <div class="selector-wrap flex-col" style="gap:10px">
      <select id="foto-select">
        <option value="">Selecciona una persona...</option>
        ${opts}
      </select>
      <div style="display:flex;gap:10px;width:100%;max-width:340px">
        <button class="btn btn-primary" style="flex:1" onclick="responderFoto('${p.nombre}', '${p.nivel}')">Confirmar</button>
        <button class="btn btn-skip" style="width:auto;padding:12px 20px" onclick="skipFoto('${p.nombre}', '${p.nivel}')">Skip</button>
      </div>
    </div>`;
}

function responderFoto(nombreCorrecto, nivel) {
  const sel = document.getElementById('foto-select');
  if (!sel.value) { showToast('Selecciona alguien primero'); return; }
  
  if (sel.value === nombreCorrecto) {
    // Correcto!
    const pts = puntosFoto(nivel, fotoIntentoActual);
    puntuacionMinijuego += pts;
    document.getElementById('foto-img').style.filter = 'blur(0px)';
    showToast(`✅ ¡Correcto! +${pts} puntos`);
    setTimeout(() => siguientePregunta(), 1500);
  } else {
    fotoIntentoActual++;
    if (fotoIntentoActual >= 4) {
      // Sin más intentos
      document.getElementById('foto-img').style.filter = 'blur(0px)';
      showToast(`❌ Era ${nombreCorrecto}. +0 puntos`);
      setTimeout(() => siguientePregunta(), 2000);
      return;
    }
    // Siguiente intento - menos blur
    document.getElementById('foto-img').style.filter = `blur(${FOTO_BLUR[fotoIntentoActual]}px)`;
    
    // Actualizar dots
    const dots = document.querySelectorAll('.intento-dot');
    dots.forEach((d, i) => {
      d.className = 'intento-dot';
      if (i < fotoIntentoActual) d.classList.add('used');
      else if (i === fotoIntentoActual) d.classList.add('active');
    });

    const pts = puntosFoto(nivel, fotoIntentoActual);
    const hint = document.querySelector('.selector-wrap').previousElementSibling;
    if (hint) hint.textContent = `¿Quién es? · +${pts} pts ahora`;
    
    showToast(`❌ Incorrecto, sigue intentando`);
    sel.value = '';
  }
}

function skipFoto(nombreCorrecto, nivel) {
  fotoIntentoActual++;
  if (fotoIntentoActual >= 4) {
    document.getElementById('foto-img').style.filter = 'blur(0px)';
    showToast(`Era ${nombreCorrecto}`);
    setTimeout(() => siguientePregunta(), 2000);
    return;
  }
  document.getElementById('foto-img').style.filter = `blur(${FOTO_BLUR[fotoIntentoActual]}px)`;
  const dots = document.querySelectorAll('.intento-dot');
  dots.forEach((d, i) => {
    d.className = 'intento-dot';
    if (i < fotoIntentoActual) d.classList.add('used');
    else if (i === fotoIntentoActual) d.classList.add('active');
  });
  const pts = puntosFoto(nivel, fotoIntentoActual);
  const hint = document.querySelector('.selector-wrap').previousElementSibling;
  if (hint) hint.textContent = `¿Quién es? · +${pts} pts ahora`;
}

// FRASES / WORDLE
// ══════════════════════════════════════════════
let wordleState = {};

function renderFrase(body, p, pct, diffLabel, diffClass) {
  const palabra = p.respuesta.replace(/\s/g, '');
  const maxIntentos = 6;
  wordleState = {
    palabra,
    respuestaOriginal: p.respuesta,
    intentoActual: 0,
    intentos: [],
    letrasConocidas: {},
    completado: false,
    pts: PUNTOS[p.nivel],
    pista: p.pista,
  };

  body.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="score-display">
      <div class="score-label">Puntuación</div>
      <div class="score-value">${puntuacionMinijuego}</div>
    </div>
    <div class="frase-display pop">
      <div style="font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">${p.quien} dice...</div>
      <span class="question-difficulty ${diffClass[p.nivel]}" style="margin-bottom:12px;display:inline-block">${diffLabel[p.nivel]}</span>
      <div style="font-size:17px;font-weight:600;color:var(--text);font-style:normal;line-height:1.6">"${formatFrase(p.frase, p.pista, p.respuesta)}"</div>
    </div>
    <div class="wordle-grid" id="wordle-grid">${buildWordleGrid(palabra.length, maxIntentos)}</div>
    <div class="keyboard" id="wordle-keyboard">${buildKeyboard()}</div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-skip" style="width:auto;padding:10px 20px;max-width:200px" onclick="skipFrase()">Skip</button>
    </div>`;
}

function formatFrase(frase, pista, respuesta) {
  // Huecos: un grupo de "_" por cada palabra de la respuesta (sin revelar nada)
  const wordBlanks = respuesta.split(' ')
    .map(w => `<span class="blank">${'_'.repeat(w.length)}</span>`)
    .join(' ');

  // Sustituye desde el primer ___ hasta el último ___ por los huecos completos.
  // Así frases con varios ___ (ej. "un ___ de ___") quedan limpias.
  const first = frase.indexOf('___');
  if (first === -1) return frase + ' ' + wordBlanks;
  const last = frase.lastIndexOf('___');
  return frase.slice(0, first) + wordBlanks + frase.slice(last + 3);
}

function buildWordleGrid(len, maxIntentos) {
  const cols = len;
  const gap = 4;
  const maxRow = 320;
  let cell = Math.floor((maxRow - gap * (cols - 1)) / cols);
  cell = Math.max(22, Math.min(44, cell));
  const fs = Math.round(cell * 0.42);
  let html = '';
  for (let i = 0; i < maxIntentos; i++) {
    html += `<div class="wordle-row" style="gap:${gap}px">`;
    for (let j = 0; j < cols; j++) {
      html += `<div class="wordle-cell" id="cell-${i}-${j}" style="width:${cell}px;height:${cell}px;font-size:${fs}px"></div>`;
    }
    html += '</div>';
  }
  return html;
}

function buildKeyboard() {
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L','Ñ'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  return rows.map(row => `
    <div class="keyboard-row">
      ${row.map(k => `<button class="key ${k.length > 1 ? 'wide' : ''}" id="key-${k}" onclick="presionarTecla('${k}')">${k}</button>`).join('')}
    </div>`).join('');
}

let currentInput = '';

function presionarTecla(key) {
  if (wordleState.completado) return;
  const len = wordleState.palabra.length;
  const cols = len;
  
  if (key === '⌫') {
    if (currentInput.length > 0) {
      currentInput = currentInput.slice(0, -1);
      const cell = document.getElementById(`cell-${wordleState.intentoActual}-${currentInput.length}`);
      if (cell) cell.textContent = '';
    }
  } else if (key === 'ENTER') {
    if (currentInput.length < cols) { showToast('Faltan letras'); return; }
    evaluarIntento();
  } else {
    if (currentInput.length < cols) {
      const cell = document.getElementById(`cell-${wordleState.intentoActual}-${currentInput.length}`);
      if (cell) { cell.textContent = key; cell.classList.add('active'); }
      currentInput += key;
    }
  }
}

function evaluarIntento() {
  const intento = currentInput;
  const palabra = wordleState.palabra;
  const cols = palabra.length;
  const row = wordleState.intentoActual;

  const resultado = Array(cols).fill('absent');
  const palabraArr = [...palabra.toUpperCase()];
  const intentoArr = [...intento];
  const usados = Array(cols).fill(false);

  // Primero correctos
  for (let i = 0; i < cols; i++) {
    if (intentoArr[i] === palabraArr[i]) {
      resultado[i] = 'correct';
      usados[i] = true;
    }
  }
  // Luego presentes
  for (let i = 0; i < cols; i++) {
    if (resultado[i] === 'correct') continue;
    for (let j = 0; j < cols; j++) {
      if (!usados[j] && intentoArr[i] === palabraArr[j]) {
        resultado[i] = 'present';
        usados[j] = true;
        break;
      }
    }
  }

  // Renderizar
  for (let i = 0; i < cols; i++) {
    const cell = document.getElementById(`cell-${row}-${i}`);
    if (cell) {
      cell.classList.remove('active');
      cell.classList.add(resultado[i]);
    }
    // Actualizar teclado
    const keyEl = document.getElementById(`key-${intento[i]}`);
    if (keyEl) {
      const cur = keyEl.className;
      if (!cur.includes('correct')) {
        if (resultado[i] === 'correct') keyEl.className = keyEl.className.replace(/present|absent/g, '') + ' correct';
        else if (resultado[i] === 'present' && !cur.includes('present')) keyEl.className += ' present';
        else if (resultado[i] === 'absent' && !cur.includes('present') && !cur.includes('correct')) keyEl.className += ' absent';
      }
    }
  }

  wordleState.intentoActual++;
  currentInput = '';

  const esCorrecta = resultado.every(r => r === 'correct');
  if (esCorrecta) {
    const pts = Math.round(wordleState.pts * (1 - (wordleState.intentoActual - 1) * 0.15));
    puntuacionMinijuego += Math.max(pts, 50);
    wordleState.completado = true;
    showToast(`✅ ¡Correcto! +${Math.max(pts, 50)} pts`);
    setTimeout(() => siguientePregunta(), 1500);
  } else if (wordleState.intentoActual >= 6) {
    wordleState.completado = true;
    showToast(`❌ Era "${wordleState.respuestaOriginal}"`);
    setTimeout(() => siguientePregunta(), 2000);
  }
}

function skipFrase() {
  wordleState.completado = true;
  showToast(`Era "${wordleState.respuestaOriginal}"`);
  setTimeout(() => siguientePregunta(), 1500);
}

// ══════════════════════════════════════════════
// FLUJO
// ══════════════════════════════════════════════
function siguientePregunta() {
  currentInput = '';
  if (audioActual) { audioActual.pause(); audioActual = null; }
  if (videoActual) { videoActual.pause(); videoActual = null; }
  
  preguntaIdx++;
  if (preguntaIdx >= preguntasActuales.length) {
    finalizarMinijuego();
  } else {
    renderPregunta();
  }
}

async function finalizarMinijuego() {
  // Guardar siempre localmente para que la pantalla final no dependa de la red
  misScores[minijuegoActivo] = puntuacionMinijuego;
  const todosCompletos = MINIJUEGOS_CONFIG.every(m => misScores[m.id] !== undefined);

  // Mostrar la pantalla de completado ya, sin esperar al guardado
  showCompletadoMinijuego(puntuacionMinijuego, todosCompletos);

  // Intentar guardar en Supabase. Si falla, avisar pero no congelar nada.
  try {
if (jugadorActual !== ADMIN) {
    await upsertScore(
        jugadorActual,
        minijuegoActivo,
        puntuacionMinijuego
    );
}  } catch (err) {
    console.error('Error guardando puntuación:', err);
    showToast('⚠️ No se pudo guardar online, reintentando...');
    // Reintento una vez tras 2s
    setTimeout(async () => {
      try {
if (jugadorActual !== ADMIN) {
    await upsertScore(
        jugadorActual,
        minijuegoActivo,
        puntuacionMinijuego
    );
}        showToast('✅ Puntuación guardada');
      } catch (e) {
        console.error('Reintento fallido:', e);
        showToast('❌ Error al guardar. Revisa tu conexión.');
      }
    }, 2000);
  }
}

    </div>`;
  
  lanzarConfetti();
}

      <div class="rank-pos">${medals[i] || (i+1)}</div>
      <div class="rank-info">
        <div class="rank-name">${p.nombre}${p.nombre === jugadorActual ? ' (tú)' : ''}</div>
        <div class="rank-details">${MINIJUEGOS_CONFIG.map(m => `${m.emoji}${p.scores[m.id] ?? '—'}`).join(' ')}</div>
      </div>
      <div class="rank-score">${p.total}</div>
    </div>`).join('');

  showScreen('final');
  lanzarConfetti();
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function lanzarConfetti() {
  const colores = ['#ff3d6b','#7c3aed','#00d4ff','#ffd700','#00e676'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colores[Math.floor(Math.random()*colores.length)]};
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*0.5}s;
        width:${6+Math.random()*8}px;
        height:${6+Math.random()*8}px;
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}
</script>
